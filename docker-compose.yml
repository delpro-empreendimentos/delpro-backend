services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: delpro
      POSTGRES_PASSWORD: delpro
      POSTGRES_DB: delpro_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@delpro.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
