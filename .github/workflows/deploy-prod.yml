name: Deploy production backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-push:
    name: Build & Push images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/delpro-empreendimentos/delpro-backend-backend:prod

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./ui
          push: true
          tags: ghcr.io/delpro-empreendimentos/delpro-backend-frontend:prod

  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.PROD_VM_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Write .env to VM
        env:
          PROD_VM_HOST: ${{ secrets.PROD_VM_HOST }}
          PROD_VM_USER: ${{ secrets.PROD_VM_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          echo "${ENV_FILE}" | ssh -i ~/.ssh/id_ed25519 "${PROD_VM_USER}@${PROD_VM_HOST}" \
            "cat > '${APP_DIR}/.env'"

      - name: Deploy on VM
        env:
          PROD_VM_HOST: ${{ secrets.PROD_VM_HOST }}
          PROD_VM_USER: ${{ secrets.PROD_VM_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "${PROD_VM_USER}@${PROD_VM_HOST}" "
            set -Eeuo pipefail

            echo 'Deploying in ${APP_DIR}'
            cd '${APP_DIR}'

            git fetch origin prod
            git checkout prod
            git reset --hard origin/prod

            echo '${GHCR_TOKEN}' | docker login ghcr.io -u delpro-empreendimentos --password-stdin

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.prod.yml ps
          "
