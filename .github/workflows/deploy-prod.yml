name: Deploy production backend

on:
  push:
    branches:
      - prod
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.PROD_VM_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on VM
        env:
          PROD_VM_HOST: ${{ secrets.PROD_VM_HOST }}
          PROD_VM_USER: ${{ secrets.PROD_VM_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "${PROD_VM_USER}@${PROD_VM_HOST}" "
            set -Eeuo pipefail

            echo 'Deploying in ${APP_DIR}'
            cd '${APP_DIR}'

            git fetch origin prod
            git checkout prod
            git reset --hard origin/prod

            docker compose config > /dev/null
            docker compose up -d --build --remove-orphans
            docker compose ps
          "